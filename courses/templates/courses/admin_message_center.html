{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-10 mx-auto">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-dark text-white p-4 rounded-top-4">
                    <h3 class="mb-0">🚨 Admin Message Center</h3>
                    <p class="mb-0 opacity-75">Send un-replyable notifications to users.</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="fw-bold mb-2">1. Select Notification Type</label>
                            <select name="notif_type" class="form-select rounded-pill">
                                <option value="warning">⚠️ Warning (Red Badge)</option>
                                <option value="info">ℹ️ General Info (Blue Badge)</option>
                                <option value="success">📢 Announcement (Green Badge)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="fw-bold mb-2">2. Your Message</label>
                            <textarea name="admin_message" class="form-control rounded-4" rows="3" placeholder="Vro, type your warning or update here..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="fw-bold d-flex justify-content-between">
                                3. Select Recipients
                                <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill" onclick="toggleAll()">Select All</button>
                            </label>
                            
                            <div class="row mt-3" style="max-height: 400px; overflow-y: auto;">
                                <div class="col-md-6 border-end">
                                    <h6 class="text-primary fw-bold">Students</h6>
                                    {% for student in students %}
                                    <div class="form-check">
                                        <input class="form-check-input user-check" type="checkbox" name="selected_users" value="{{ student.id }}" id="u{{ student.id }}">
                                        <label class="form-check-label small" for="u{{ student.id }}">
                                            {{ student.username }} ({{ student.email }})
                                        </label>
                                    </div>
                                    {% endfor %}
                                </div>
                                <div class="col-md-6">
                                    <h6 class="text-success fw-bold">Teachers</h6>
                                    {% for teacher in teachers %}
                                    <div class="form-check">
                                        <input class="form-check-input user-check" type="checkbox" name="selected_users" value="{{ teacher.id }}" id="u{{ teacher.id }}">
                                        <label class="form-check-label small" for="u{{ teacher.id }}">
                                            {{ teacher.username }} (Staff)
                                        </label>
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold">
                            🚀 Blast Notification to Selected Users
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleAll() {
        let checkboxes = document.querySelectorAll('.user-check');
        let allChecked = Array.from(checkboxes).every(c => c.checked);
        checkboxes.forEach(c => c.checked = !allChecked);
    }
</script>
{% endblock %}
