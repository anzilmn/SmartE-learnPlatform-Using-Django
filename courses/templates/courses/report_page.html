{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    <h3 class="fw-black text-danger mb-3"><i class="bi bi-flag-fill"></i> Report Comment</h3>
                    <p class="text-muted small">You are reporting the following comment by <b>@{{ comment.user.username }}</b>:</p>
                    
                    <div class="p-3 bg-light rounded-3 mb-4 italic">
                        "{{ comment.content }}"
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Reason for reporting</label>
                            <textarea name="reason" class="form-control rounded-4" rows="4" placeholder="e.g. Offensive language, spam, or harassment..." required></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-pill fw-bold">Submit Report</button>
                            <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-light btn-pill text-muted">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
