{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <a href="{% url 'admin_support_dashboard' %}" class="btn btn-link text-decoration-none mb-3 p-0">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
            
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header bg-primary text-white p-4">
                    <h5 class="mb-0">Replying to: {{ ticket.subject }}</h5>
                    <small class="opacity-75">From: {{ ticket.user.username }} ({{ ticket.user.email }})</small>
                </div>
                <div class="card-body p-4">
                    <div class="bg-light p-3 rounded-3 mb-4">
                        <label class="fw-bold small text-uppercase text-muted">Student Message:</label>
                        <p class="mb-0">{{ ticket.message }}</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="fw-bold mb-2">Your Professional Reply</label>
                            {{ form.admin_reply }}
                        </div>
                        <div class="form-check mb-4">
                            {{ form.is_resolved }}
                            <label class="form-check-label ms-2">Mark as Resolved</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">
                            Send Reply & Notify Student <i class="bi bi-send-fill ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
