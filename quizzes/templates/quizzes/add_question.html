{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <div class="text-center mb-4">
                    <span class="badge bg-primary mb-2">Quiz: {{ quiz.title }}</span>
                    <h2 class="fw-black">Add Question ❓</h2>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Question Text</label>
                        <textarea name="question_text" class="form-control rounded-4" rows="3" placeholder="What is the main topic of..." required></textarea>
                    </div>

                    <label class="fw-bold mb-3">Options (Mark the correct one)</label>
                    {% for i in "1234" %}
                    <div class="input-group mb-3">
                        <div class="input-group-text bg-white border-end-0 rounded-start-pill">
                            <input class="form-check-input mt-0" type="radio" name="correct_choice" value="{{ i }}" {% if i == "1" %}checked{% endif %}>
                        </div>
                        <input type="text" name="choice_{{ i }}" class="form-control border-start-0 rounded-end-pill" placeholder="Option {{ i }}" required>
                    </div>
                    {% endfor %}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">
                            Save & Add Another Question
                        </button>
                        <a href="{% url 'course_detail' quiz.course.id %}" class="btn btn-outline-dark rounded-pill fw-bold">
                            Done / Finish Quiz
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
