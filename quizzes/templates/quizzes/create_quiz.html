{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-black">Create Final Quiz 📝</h2>
                    <p class="text-muted small">Course: {{ course.title }}</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="fw-bold small mb-1">Quiz Title</label>
                        {{ quiz_form.title }}
                    </div>

                    <div class="row mb-4">
                        <div class="col">
                            <label class="fw-bold small mb-1">Passing Score (%)</label>
                            {{ quiz_form.pass_score }}
                        </div>
                        <div class="col">
                            <label class="fw-bold small mb-1">Time Limit (Mins)</label>
                            {{ quiz_form.time_limit }}
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow">
                            Save Quiz & Add Questions
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
