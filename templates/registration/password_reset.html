{% extends 'base.html' %}
{% block title %}Reset Password - Smart Learn{% endblock %}
{% block content %}
<div class="login-container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0" style="border-radius: 25px; overflow: hidden;">
            <div class="text-center p-5" style="background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%); color: white;">
                <i class="bi bi-key-fill display-4 mb-3"></i>
                <h3 class="fw-bold">Forgot Password?</h3>
                <p class="small opacity-75 mb-0">Enter your email to get a reset link, vro!</p>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm" style="background: linear-gradient(45deg, #0d6efd, #0b5ed7); border: none;">
                        Send Reset Email
                    </button>
                </form>
                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="text-decoration-none small fw-bold text-primary">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
