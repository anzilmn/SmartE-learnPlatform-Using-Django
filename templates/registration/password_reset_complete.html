{% extends 'base.html' %}
{% block content %}
<div class="login-container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="col-md-5 col-lg-4 text-center">
        <div class="card shadow-lg border-0 p-5" style="border-radius: 25px;">
            <div class="mb-4">
                <i class="bi bi-patch-check-fill display-1 text-primary"></i>
            </div>
            <h2 class="fw-bold">Password Reset!</h2>
            <p class="text-muted">Your password has been successfully updated. Now you can log back in and continue your streak!</p>
            <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-5 mt-3 shadow" style="background: linear-gradient(45deg, #0d6efd, #0b5ed7); border: none;">
                Login Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
