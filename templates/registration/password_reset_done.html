{% extends 'base.html' %}
{% block content %}
<div class="login-container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="col-md-5 col-lg-4 text-center">
        <div class="card shadow-lg border-0 p-5" style="border-radius: 25px;">
            <div class="mb-4">
                <i class="bi bi-send-check-fill display-1 text-success"></i>
            </div>
            <h2 class="fw-bold text-dark">Email Sent!</h2>
            <p class="text-muted">Vro, check your Gmail. We've sent instructions to reset your password. If it's not there, check your <b>Spam</b> folder!</p>
            <a href="{% url 'login' %}" class="btn btn-outline-primary rounded-pill px-5 mt-3">Okay, Got it</a>
        </div>
    </div>
</div>
{% endblock %}
